version: "3.9"

services:

  backend:
    build: ./Backend
    container_name: nearbyhappenings-backend
    ports:
      - "5000:5000"
    env_file:
      - ./Backend/.env
    depends_on:
      - mongo
    restart: always

  frontend:
    build: 
      context: ./Frontend
      args:
        VITE_API_URL: http://65.0.45.151:5000/nearby-happenings
    container_name: nearbyhappenings-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always

  mongo:
    image: mongo:7
    container_name: nearby-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: