name: Nearby Happenings CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Backend Dependencies
      run: |
        cd Backend
        npm install

    - name: Install Frontend Dependencies
      run: |
        cd Frontend
        npm install

    - name: Build Frontend
      run: |
        cd Frontend
        npm run build